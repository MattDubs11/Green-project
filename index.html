<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Plaza Redesign</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    /* SECTION */
    #features {
      padding: 80px 20px;
    }

    /* CIRCLES CONTAINER */
    .circle-container {
      display: flex;
      justify-content: center;
      gap: 80px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    /* CIRCLE STYLE */
    .circle {
      width: 130px;
      height: 130px;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .circle:hover {
      transform: scale(1.1);
      border-color: white;
    }

    /* ICON SIZE */
    .circle span {
      font-size: 45px;
    }

    /* OPTIONAL TITLES UNDER CIRCLES */
    .label {
      margin-top: 15px;
      font-size: 16px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <section id="features">
    <h1>Project Focus</h1>

    <div class="circle-container">

      <div>
        <div class="circle">
          <span>⛏️</span>
        </div>
        <div class="label">Construction</div>
      </div>

      <div>
        <div class="circle">
          <span>🌿</span>
        </div>
        <div class="label">Environment</div>
      </div>

      <div>
        <div class="circle">
          <span>👥</span>
        </div>
        <div class="label">Community</div>
      </div>

    </div>
  </section>

</body>
</html>
