<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montefiore Square Redesign</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

/* NAVBAR */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  padding: 20px;
  text-align: center;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
}

/* HERO */
header {
  height: 100vh;
  background: url('plaza.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

header h1 {
  font-size: 50px;
}

/* SECTIONS */
section {
  padding: 80px 20px;
  text-align: center;
}

/* CIRCLES */
.circle-container {
  display: flex;
  justify-content: center;
  gap: 80px;
  flex-wrap: wrap;
}

.circle {
  width: 130px;
  height: 130px;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.circle span {
  font-size: 45px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
  padding: 40px;
}

.grid div {
  position: relative;
}

.grid img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.label {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.6);
  padding: 6px 12px;
  border-radius: 5px;
}
</style>
</head>

<body>

<nav>
  Montefiore Square Redesign
</nav>

<header>
  <h1>Reimagining Urban Space</h1>
</header>

<section>
  <h2>Project Focus</h2>

  <div class="circle-container">
    <div class="circle"><span>⛏️</span></div>
    <div class="circle"><span>🌿</span></div>
    <div class="circle"><span>👥</span></div>
  </div>
</section>

<section>
  <h2>Before • During • After</h2>

  <div class="grid">

    <div>
      <img src="before1.jpg">
      <div class="label">Before</div>
    </div>

    <div>
      <img src="construction1.jpg">
      <div class="label">During</div>
    </div>

    <div>
      <img src="after1.jpg">
      <div class="label">After</div>
    </div>

    <div>
      <img src="before2.jpg">
      <div class="label">Before</div>
    </div>

    <div>
      <img src="construction2.jpg">
      <div class="label">During</div>
    </div>

    <div>
      <img src="final.jpg">
      <div class="label">Final</div>
    </div>

  </div>
</section>

</body>
</html>
